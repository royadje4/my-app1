<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fresh Knowledge Generator</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <section class="card">
      <p class="eyebrow">General Knowledge App</p>
      <h1>Fresh Knowledge Generator</h1>
      <p class="intro">Tap the button to get a new general knowledge question every time.</p>

      <div class="controls">
        <select id="category">
          <option value="">Any Category</option>
          <option value="9">General Knowledge</option>
          <option value="17">Science & Nature</option>
          <option value="18">Computers</option>
          <option value="22">Geography</option>
          <option value="23">History</option>
          <option value="21">Sports</option>
        </select>

        <select id="difficulty">
          <option value="">Any Difficulty</option>
          <option value="easy">Easy</option>
          <option value="medium">Medium</option>
          <option value="hard">Hard</option>
        </select>
      </div>

      <button id="generateBtn">Generate fresh question</button>

      <div id="quizBox" class="quiz-box hidden">
        <div class="meta">
          <span id="questionCategory"></span>
          <span id="questionDifficulty"></span>
        </div>
        <h2 id="questionText"></h2>
        <div id="answers" class="answers"></div>
        <p id="result" class="result"></p>
      </div>

      <p id="status" class="status">Ready.</p>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
